<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Georgia', serif; }
    canvas { display: block; }

    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 12px; height: 12px;
      pointer-events: none;
      opacity: 0.6;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: #fff;
    }
    #crosshair::before { width: 1px; height: 100%; left: 50%; }
    #crosshair::after  { width: 100%; height: 1px; top: 50%; }

    #hud {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
    }

    #interact-hint {
      position: fixed;
      bottom: 60px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      letter-spacing: 0.08em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #interact-hint.visible { opacity: 1; }

    #room-label {
      position: fixed;
      top: 32px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }

    #overlay {
      position: fixed; inset: 0;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 24px;
      z-index: 100;
      transition: opacity 1s;
    }
    #overlay h1 {
      color: #fff;
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    #overlay p {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      letter-spacing: 0.15em;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<div id="overlay">
  <h1>House</h1>
  <p>Click to enter &nbsp;·&nbsp; WASD to move &nbsp;·&nbsp; Mouse to look</p>
</div>

<div id="crosshair"></div>
<div id="vignette"></div>
<div id="room-label"></div>
<div id="interact-hint">[ E ] Inspect</div>
<div id="hud">WASD · Mouse · E to interact</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { EffectComposer } from 'https://unpkg.com/three@0.158.0/examples/jsm/postprocessing/EffectComposer.js';
  import { RenderPass } from 'https://unpkg.com/three@0.158.0/examples/jsm/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'https://unpkg.com/three@0.158.0/examples/jsm/postprocessing/UnrealBloomPass.js';
  import { BokehPass } from 'https://unpkg.com/three@0.158.0/examples/jsm/postprocessing/BokehPass.js';
  import { Sky } from 'https://unpkg.com/three@0.158.0/examples/jsm/objects/Sky.js';

  // ── Renderer ────────────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.9;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  // ── Scene ───────────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0xc8d8e8, 0.004);

  // ── Camera ──────────────────────────────────────────────────────────────────
  const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.05, 800);
  camera.position.set(0, 1.43, -14); // on forecourt, facing front door

  // ── Post-processing ─────────────────────────────────────────────────────────
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  composer.addPass(new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.18, 0.4, 0.88
  ));

  // ── Sky ─────────────────────────────────────────────────────────────────────
  const sky = new Sky();
  sky.scale.setScalar(450000);
  scene.add(sky);
  const skyUni = sky.material.uniforms;
  skyUni['turbidity'].value    = 5;
  skyUni['rayleigh'].value     = 1.8;
  skyUni['mieCoefficient'].value    = 0.005;
  skyUni['mieDirectionalG'].value   = 0.8;
  const sunVec = new THREE.Vector3();
  const phi = THREE.MathUtils.degToRad(90 - 35);
  const theta = THREE.MathUtils.degToRad(200);
  sunVec.setFromSphericalCoords(1, phi, theta);
  skyUni['sunPosition'].value.copy(sunVec);

  // ── Lighting ────────────────────────────────────────────────────────────────
  const hemi = new THREE.HemisphereLight(0xfff4e0, 0x8ab4a0, 0.6);
  scene.add(hemi);

  const sun = new THREE.DirectionalLight(0xfff8e7, 2.5);
  sun.position.copy(sunVec).multiplyScalar(100);
  sun.castShadow = true;
  sun.shadow.mapSize.set(4096, 4096);
  sun.shadow.camera.near = 1;
  sun.shadow.camera.far  = 500;
  sun.shadow.camera.left = sun.shadow.camera.bottom = -120;
  sun.shadow.camera.right = sun.shadow.camera.top   =  120;
  sun.shadow.bias = -0.001;
  scene.add(sun);

  // ── Placeholder house (to be replaced by scene.js) ──────────────────────────
  let getRoomLabel = null;
  import('./scene.js').then(({ buildHouse, getRoomLabel: grl }) => {
    buildHouse(scene);
    getRoomLabel = grl;
    scene.traverse(obj => {
      if (obj.isMesh) { obj.castShadow = true; obj.receiveShadow = true; }
    });
    buildCollisionLists();
  });

  // ── Physics & collision ──────────────────────────────────────────────────────
  // Collected after scene loads
  let floorMeshes = [];   // meshes that can be stood on (horizontal surfaces)
  let wallMeshes  = [];   // meshes that block horizontal movement

  const EYE_HEIGHT  = 1.65;   // m above floor
  const STEP_UP     = 0.55;   // max step the player can climb per frame (stair height)
  const PLAYER_R    = 0.32;   // collision radius (m)
  const GRAVITY     = 16.0;   // m/s²
  const SNAP_DIST   = 3.5;    // downward cast distance to look for floor

  let playerY    = -0.22;  // world Y of player feet (starts on forecourt at lawn level)
  let fallSpeed  = 0;     // vertical velocity (positive = falling)

  const _floorRay = new THREE.Raycaster();
  const _wallRay  = new THREE.Raycaster();
  _floorRay.far   = SNAP_DIST;

  function buildCollisionLists() {
    scene.traverse(obj => {
      if (!obj.isMesh) return;
      const mat = obj.material;
      // Skip transparent/glass and emissive-only items
      if (mat && mat.transparent && (mat.opacity || 1) < 0.7) return;

      const bb = new THREE.Box3().setFromObject(obj);
      const size = new THREE.Vector3();
      bb.getSize(size);

      // Floor candidates: wide AND thin vertically
      if (size.y < 0.6 && Math.max(size.x, size.z) > 0.5) {
        floorMeshes.push(obj);
      }

      // Wall candidates: tall enough to block movement, not tiny details
      if (size.y > 0.7 && Math.min(size.x, size.z) > 0.05 && Math.max(size.x, size.z) > 0.3) {
        wallMeshes.push(obj);
      }
    });
  }

  function sampleFloor(x, z, fromY) {
    // Cast downward from slightly above the player feet
    _floorRay.set(new THREE.Vector3(x, fromY + 0.3, z), new THREE.Vector3(0, -1, 0));
    const hits = _floorRay.intersectObjects(floorMeshes, false);
    for (const h of hits) {
      if (h.distance > 0.05) return h.point.y; // first valid hit
    }
    return null;
  }

function resolveMovement(cx, cz, footY, dx, dz) {
    // Try full move first
    if (!isBlocked(cx + dx, cz + dz, footY)) return { x: cx + dx, z: cz + dz };
    // Try X only
    if (!isBlocked(cx + dx, cz, footY)) return { x: cx + dx, z: cz };
    // Try Z only
    if (!isBlocked(cx, cz + dz, footY)) return { x: cx, z: cz + dz };
    return { x: cx, z: cz };
  }

  function isBlocked(tx, tz, footY) {
    // Cast rays outward in 4 cardinal directions from target position
    // at two heights (knee and chest) to catch walls reliably
    const checkHeights = [footY + 0.4, footY + 1.1];
    for (const y of checkHeights) {
      for (const dir of [
        new THREE.Vector3(1,0,0), new THREE.Vector3(-1,0,0),
        new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,-1)
      ]) {
        _wallRay.set(new THREE.Vector3(tx, y, tz), dir);
        _wallRay.far = PLAYER_R;
        const hits = _wallRay.intersectObjects(wallMeshes, false);
        if (hits.length > 0 && hits[0].distance < PLAYER_R) return true;
      }
    }
    return false;
  }

  // ── First-person controller ─────────────────────────────────────────────────
  const overlay = document.getElementById('overlay');
  const keys = {};
  let locked = false;
  let yaw = 0, pitch = 0;
  const SPEED  = 5.0;
  const SPRINT = 11.0;

  document.addEventListener('keydown', e => keys[e.code] = true);
  document.addEventListener('keyup',   e => keys[e.code] = false);

  overlay.addEventListener('click', () => renderer.domElement.requestPointerLock());

  document.addEventListener('pointerlockchange', () => {
    locked = document.pointerLockElement === renderer.domElement;
    overlay.classList.toggle('hidden', locked);
  });

  document.addEventListener('mousemove', e => {
    if (!locked) return;
    yaw   -= e.movementX * 0.0018;
    pitch -= e.movementY * 0.0018;
    pitch = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, pitch));
  });

  // ── Animate ─────────────────────────────────────────────────────────────────
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.1);

    if (locked) {
      const speed = keys['ShiftLeft'] || keys['ShiftRight'] ? SPRINT : SPEED;
      const move = new THREE.Vector3();
      if (keys['KeyW'] || keys['ArrowUp'])    move.z -= 1;
      if (keys['KeyS'] || keys['ArrowDown'])  move.z += 1;
      if (keys['KeyA'] || keys['ArrowLeft'])  move.x -= 1;
      if (keys['KeyD'] || keys['ArrowRight']) move.x += 1;
      move.normalize().multiplyScalar(speed * delta);
      move.applyEuler(new THREE.Euler(0, yaw, 0));

      const cx = camera.position.x;
      const cz = camera.position.z;

      // Wall collision — resolve movement
      let resolved;
      if (wallMeshes.length > 0 && (move.x !== 0 || move.z !== 0)) {
        resolved = resolveMovement(cx, cz, playerY, move.x, move.z);
      } else {
        resolved = { x: cx + move.x, z: cz + move.z };
      }

      // Floor detection — look for ground below new position
      if (floorMeshes.length > 0) {
        const floorY = sampleFloor(resolved.x, resolved.z, playerY + STEP_UP);
        if (floorY !== null) {
          const targetY = floorY; // feet land here
          // Smooth step-up / step-down
          if (targetY > playerY + STEP_UP) {
            // Too high to step up — don't advance horizontally
            resolved = { x: cx, z: cz };
          } else {
            const dy = targetY - playerY;
            playerY += dy * Math.min(1, 14 * delta); // smooth snap
            fallSpeed = 0;
          }
        } else {
          // No floor found — fall
          fallSpeed += GRAVITY * delta;
          playerY -= fallSpeed * delta;
          playerY = Math.max(-5, playerY); // safety net
        }
      }

      camera.position.x = resolved.x;
      camera.position.z = resolved.z;
      camera.position.y = playerY + EYE_HEIGHT;
    }

    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    // Room label HUD
    if (getRoomLabel) {
      const label = getRoomLabel(camera.position.x, camera.position.z, camera.position.y);
      const el = document.getElementById('room-label');
      if (el) el.textContent = label;
    }

    composer.render();
  }

  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
