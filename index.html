<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Georgia', serif; }
    canvas { display: block; }

    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 12px; height: 12px;
      pointer-events: none;
      opacity: 0.6;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: #fff;
    }
    #crosshair::before { width: 1px; height: 100%; left: 50%; }
    #crosshair::after  { width: 100%; height: 1px; top: 50%; }

    #hud {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
    }

    #interact-hint {
      position: fixed;
      bottom: 60px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      letter-spacing: 0.08em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #interact-hint.visible { opacity: 1; }

    #room-label {
      position: fixed;
      top: 32px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }

    #overlay {
      position: fixed; inset: 0;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 24px;
      z-index: 100;
      transition: opacity 1s;
    }
    #overlay h1 {
      color: #fff;
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    #overlay p {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      letter-spacing: 0.15em;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<div id="overlay">
  <h1>House</h1>
  <p>Click to enter &nbsp;·&nbsp; WASD to move &nbsp;·&nbsp; Mouse to look</p>
</div>

<div id="crosshair"></div>
<div id="vignette"></div>
<div id="room-label"></div>
<div id="interact-hint">[ E ] Inspect</div>
<div id="hud">WASD · Mouse · E to interact</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { EffectComposer } from 'https://unpkg.com/three@0.158.0/examples/jsm/postprocessing/EffectComposer.js';
  import { RenderPass } from 'https://unpkg.com/three@0.158.0/examples/jsm/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'https://unpkg.com/three@0.158.0/examples/jsm/postprocessing/UnrealBloomPass.js';
  import { BokehPass } from 'https://unpkg.com/three@0.158.0/examples/jsm/postprocessing/BokehPass.js';
  import { Sky } from 'https://unpkg.com/three@0.158.0/examples/jsm/objects/Sky.js';

  // ── Renderer ────────────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.9;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  // ── Scene ───────────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0xc8d8e8, 0.004);

  // ── Camera ──────────────────────────────────────────────────────────────────
  const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.05, 500);
  camera.position.set(0, 1.65, 8); // outside, looking at house

  // ── Post-processing ─────────────────────────────────────────────────────────
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  composer.addPass(new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.18, 0.4, 0.88
  ));

  // ── Sky ─────────────────────────────────────────────────────────────────────
  const sky = new Sky();
  sky.scale.setScalar(450000);
  scene.add(sky);
  const skyUni = sky.material.uniforms;
  skyUni['turbidity'].value    = 5;
  skyUni['rayleigh'].value     = 1.8;
  skyUni['mieCoefficient'].value    = 0.005;
  skyUni['mieDirectionalG'].value   = 0.8;
  const sunVec = new THREE.Vector3();
  const phi = THREE.MathUtils.degToRad(90 - 35);
  const theta = THREE.MathUtils.degToRad(200);
  sunVec.setFromSphericalCoords(1, phi, theta);
  skyUni['sunPosition'].value.copy(sunVec);

  // ── Lighting ────────────────────────────────────────────────────────────────
  const hemi = new THREE.HemisphereLight(0xfff4e0, 0x8ab4a0, 0.6);
  scene.add(hemi);

  const sun = new THREE.DirectionalLight(0xfff8e7, 2.5);
  sun.position.copy(sunVec).multiplyScalar(100);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far  = 200;
  sun.shadow.camera.left = sun.shadow.camera.bottom = -30;
  sun.shadow.camera.right = sun.shadow.camera.top   =  30;
  sun.shadow.bias = -0.001;
  scene.add(sun);

  // ── Placeholder house (to be replaced by scene.js) ──────────────────────────
  import('./scene.js').then(({ buildHouse }) => {
    buildHouse(scene);
    scene.traverse(obj => {
      if (obj.isMesh) { obj.castShadow = true; obj.receiveShadow = true; }
    });
  });

  // ── First-person controller ─────────────────────────────────────────────────
  const overlay = document.getElementById('overlay');
  const keys = {};
  let locked = false;
  let yaw = 0, pitch = 0;
  const velocity = new THREE.Vector3();
  const SPEED = 3.5;
  const SPRINT = 6.0;

  document.addEventListener('keydown', e => keys[e.code] = true);
  document.addEventListener('keyup',   e => keys[e.code] = false);

  overlay.addEventListener('click', () => {
    renderer.domElement.requestPointerLock();
  });

  document.addEventListener('pointerlockchange', () => {
    locked = document.pointerLockElement === renderer.domElement;
    overlay.classList.toggle('hidden', locked);
  });

  document.addEventListener('mousemove', e => {
    if (!locked) return;
    yaw   -= e.movementX * 0.0018;
    pitch -= e.movementY * 0.0018;
    pitch = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, pitch));
  });

  // ── Animate ─────────────────────────────────────────────────────────────────
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.1);

    if (locked) {
      const speed = keys['ShiftLeft'] || keys['ShiftRight'] ? SPRINT : SPEED;
      const dir = new THREE.Vector3();
      if (keys['KeyW'] || keys['ArrowUp'])    dir.z -= 1;
      if (keys['KeyS'] || keys['ArrowDown'])  dir.z += 1;
      if (keys['KeyA'] || keys['ArrowLeft'])  dir.x -= 1;
      if (keys['KeyD'] || keys['ArrowRight']) dir.x += 1;

      dir.normalize().multiplyScalar(speed * delta);
      dir.applyEuler(new THREE.Euler(0, yaw, 0));
      camera.position.add(dir);
      camera.position.y = 1.65; // fixed eye height for now
    }

    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    composer.render();
  }

  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
